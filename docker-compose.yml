services:
  api:
    build:
      context: ./api
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/apps/rest-api/src/db
    environment:
      ENV_STATE: dev

  ui:
    build:
      context: ./ui
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  db_data:
